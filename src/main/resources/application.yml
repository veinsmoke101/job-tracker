spring:
  application:
    name: job-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/jobtracker
    username: jobtracker
    password: jobtracker
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  profiles:
    active: dev

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-must-be-long}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:86400000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
